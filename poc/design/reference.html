<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Design Standard</title>
  <style>
    /* ── Reset ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page ────────────────────────────────────────── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Card ────────────────────────────────────────── */
    .card {
      width: 420px;
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 40px 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    /* ── Logo / Brand ────────────────────────────────── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { display: block; }
    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      letter-spacing: -0.3px;
    }

    /* ── Headings ────────────────────────────────────── */
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    /* ── Form ────────────────────────────────────────── */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      background: #f9fafb;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      outline: none;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #4f46e5;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    }
    input::placeholder { color: #9ca3af; }

    /* ── Password row ────────────────────────────────── */
    .password-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .forgot {
      font-size: 13px;
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot:hover { text-decoration: underline; }

    /* ── Remember me ─────────────────────────────────── */
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #4f46e5;
      cursor: pointer;
    }
    .remember span {
      font-size: 13px;
      color: #6b7280;
      cursor: pointer;
    }

    /* ── Submit button ───────────────────────────────── */
    .btn-primary {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.1px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ── Divider ─────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
    .divider span { font-size: 12px; color: #9ca3af; white-space: nowrap; }

    /* ── Social buttons ──────────────────────────────── */
    .social-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }
    .btn-social {
      flex: 1;
      height: 40px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-social:hover { background: #f9fafb; border-color: #d1d5db; }
    .btn-social img { width: 18px; height: 18px; }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
    }
    .footer a {
      color: #4f46e5;
      font-weight: 600;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
                stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">Synapse</span>
    </div>

    <!-- Heading -->
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to your dashboard</p>

    <!-- Form -->
    <form>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" />
      </div>

      <div class="form-group">
        <div class="password-row">
          <label for="password" style="margin-bottom:0">Password</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <div class="remember">
        <input type="checkbox" id="remember" />
        <span>Remember me for 30 days</span>
      </div>

      <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <!-- Divider -->
    <div class="divider"><span>or continue with</span></div>

    <!-- Social -->
    <div class="social-row">
      <button class="btn-social" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="btn-social" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#24292e">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </button>
    </div>

    <!-- Footer -->
    <p class="footer">Don't have an account? <a href="#">Sign up free</a></p>
  </div>
</body>
</html>
