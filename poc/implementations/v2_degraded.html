<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — V2 Degraded Implementation</title>
  <style>
    /* Implementation with significant design drift:
       - Wrong background (light gray, no gradient)
       - Wrong card width and padding
       - Red button instead of indigo
       - Missing brand icon
       - Wrong font sizes
       - Missing social login section
       - Different corner radii
       - Different color palette
    */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* WRONG: flat light background */
      background: #f3f4f6;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      /* WRONG: too narrow, too much padding */
      width: 360px;
      background: #ffffff;
      /* WRONG: sharp corners */
      border-radius: 4px;
      padding: 32px 32px;
      border: 1px solid #d1d5db;
      /* WRONG: no shadow depth */
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* WRONG: no brand icon, just text */
    .brand {
      margin-bottom: 24px;
    }
    .brand-name {
      /* WRONG: smaller, wrong weight */
      font-size: 16px;
      font-weight: 400;
      color: #6b7280;
    }

    h1 {
      /* WRONG: smaller heading */
      font-size: 18px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .subtitle {
      /* WRONG: too small */
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 400;
      /* WRONG: label color too light */
      color: #9ca3af;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: 40px;
      padding: 0 10px;
      /* WRONG: sharp corners, no background tint */
      border: 1px solid #d1d5db;
      border-radius: 2px;
      font-size: 14px;
      color: #374151;
      background: #ffffff;
      outline: none;
    }
    input::placeholder { color: #d1d5db; }

    /* WRONG: forgot link missing, password label inline gone */
    .password-label-row { margin-bottom: 4px; }

    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }
    .remember input[type="checkbox"] { width: 14px; height: 14px; }
    .remember span { font-size: 12px; color: #9ca3af; }

    /* WRONG: red button, square corners */
    .btn-primary {
      width: 100%;
      height: 40px;
      background: #dc2626;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* WRONG: divider text different */
    .divider {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      margin: 20px 0;
      border-top: 1px solid #e5e7eb;
      padding-top: 20px;
    }

    /* WRONG: missing social buttons entirely, just a text link */
    .social-placeholder {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 20px;
    }
    .social-placeholder a { color: #6b7280; text-decoration: underline; }

    /* WRONG: footer different styling */
    .footer {
      text-align: left;
      font-size: 12px;
      color: #9ca3af;
      border-top: 1px solid #f3f4f6;
      padding-top: 16px;
      margin-top: 4px;
    }
    .footer a { color: #374151; }
  </style>
</head>
<body>
  <div class="card">
    <!-- WRONG: no icon, just plain text brand -->
    <div class="brand">
      <span class="brand-name">synapse</span>
    </div>

    <h1>Sign In</h1>
    <p class="subtitle">Enter your credentials to access the platform</p>

    <form>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email address" />
      </div>

      <div class="form-group">
        <!-- WRONG: no password/forgot row, just a plain label -->
        <div class="password-label-row">
          <label for="password">Password</label>
        </div>
        <input type="password" id="password" placeholder="Password" />
      </div>

      <!-- WRONG: remember me text differs -->
      <div class="remember">
        <input type="checkbox" id="remember" />
        <span>Keep me signed in</span>
      </div>

      <!-- WRONG: red button with uppercase SIGN IN -->
      <button type="submit" class="btn-primary">SIGN IN</button>
    </form>

    <!-- WRONG: no social buttons, just a divider and text -->
    <div class="divider">OR</div>
    <div class="social-placeholder">
      <a href="#">Continue with Google or GitHub</a>
    </div>

    <!-- WRONG: footer left-aligned and different copy -->
    <p class="footer">New user? <a href="#">Create an account</a></p>
  </div>
</body>
</html>
